<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Race Timer Pro</title>

<style>
:root {
  --bg: #f5f5f7;
  --card: rgba(255,255,255,0.7);
  --border: rgba(0,0,0,0.08);
  --text: #1d1d1f;
  --accent: #007aff;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  text-align: center;
}

.container {
  max-width: 650px;
  margin: auto;
  padding: 20px;
}

.card {
  background: var(--card);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
}

.timer {
  font-size: 3.2rem;
  font-weight: 600;
  margin: 10px 0;
}

button {
  border: none;
  border-radius: 16px;
  padding: 14px 20px;
  margin: 8px 0;
  font-size: 1rem;
  cursor: pointer;
}

.primary {
  background: var(--accent);
  color: white;
  width: 100%;
  height: 90px;
  font-size: 1.6rem;
  font-weight: 600;
}

.finish {
  width: 100%;
  height: 260px;
  font-size: 3rem;
  font-weight: 700;
  background: #34c759;
  color: white;
  border-radius: 24px;
}

button:active {
  transform: scale(0.97);
}

input {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
}

#bibQuickInput {
  width: 100%;
  margin-top: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.95rem;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid var(--border);
}

.unassigned {
  background: rgba(255,149,0,0.15);
}

td[contenteditable="true"]:focus {
  outline: 2px solid var(--accent);
  background: #fff;
}
</style>
</head>

<body>

<div class="container">

  <h2>Race Timer</h2>

  <!-- TIMER -->
  <div class="card">
    <div class="timer" id="timer">00:00.000</div>

    <button class="primary" onclick="start()">Start</button>
    <button onclick="stop()">Stop</button>
    <button onclick="resetRace()">Reset</button>
  </div>

  <!-- FINISH -->
  <button class="finish" onclick="finish()">TAP FINISH</button>

  <!-- CONTROLS -->
  <div class="card">

    <label style="display:flex; justify-content:space-between;">
      <span>Assign Mode</span>
      <input type="checkbox" id="assignMode" onchange="toggleAssignMode()" />
    </label>

    <br>

    <label style="display:flex; justify-content:space-between;">
      <span>Bib Quick Entry</span>
      <input type="checkbox" id="bibMode" onchange="toggleBibMode()" />
    </label>

    <input id="bibQuickInput"
           placeholder="Scan or type bib → Enter"
           style="display:none;"
           onkeydown="handleBibEnter(event)" />

    <br>

    <button onclick="undo()">Undo Last</button>
    <button onclick="newRace()">New Race</button>
    <button onclick="exportCSV()">Export CSV</button>

  </div>

  <!-- RESULTS -->
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Place</th>
          <th>Name</th>
          <th>Bib</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody id="results"></tbody>
    </table>
  </div>

</div>

<script>
let startTime = null;
let running = false;
let interval = null;

let assignMode = false;
let bibMode = false;

let data = JSON.parse(localStorage.getItem("raceData")) || {
  races: [[]],
  current: 0
};

function format(ms) {
  const m = Math.floor(ms/60000);
  const s = Math.floor((ms%60000)/1000);
  const ms2 = ms%1000;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms2).padStart(3,'0')}`;
}

function tick() {
  if (!running) return;
  document.getElementById("timer").textContent = format(Date.now() - startTime);
}

function start() {
  if (running) return;
  running = true;
  startTime = Date.now();
  interval = setInterval(tick, 30);
}

function stop() {
  running = false;
  clearInterval(interval);
}

function finish() {
  if (!running) return;

  const time = Date.now() - startTime;
  const race = data.races[data.current];

  race.push({
    place: race.length + 1,
    name: "",
    bib: "",
    time
  });

  save();
  render();

  if (assignMode) {
    setTimeout(() => {
      const rows = document.querySelectorAll("#results tr");
      const last = rows[rows.length - 1];
      if (last) last.children[1].focus();
    }, 50);
  }
}

function toggleAssignMode() {
  assignMode = document.getElementById("assignMode").checked;
}

function toggleBibMode() {
  bibMode = document.getElementById("bibMode").checked;
  const input = document.getElementById("bibQuickInput");

  input.style.display = bibMode ? "block" : "none";

  if (bibMode) setTimeout(() => input.focus(), 50);
}

function handleBibEnter(e) {
  if (e.key !== "Enter") return;

  const value = e.target.value.trim();
  if (!value) return;

  const race = data.races[data.current];
  const index = race.findIndex(r => !r.bib);

  if (index !== -1) {
    race[index].bib = value;
  }

  save();
  render();

  e.target.value = "";
  setTimeout(() => e.target.focus(), 10);
}

function undo() {
  const race = data.races[data.current];
  race.pop();
  save();
  render();
}

function resetRace() {
  data.races[data.current] = [];
  save();
  render();
  document.getElementById("timer").textContent = "00:00.000";
}

function newRace() {
  data.races.push([]);
  data.current = data.races.length - 1;
  save();
  render();
}

function updateField(index, field, value) {
  data.races[data.current][index][field] = value;
  save();
}

function render() {
  const race = data.races[data.current];
  const tbody = document.getElementById("results");
  tbody.innerHTML = "";

  race.forEach((r, i) => {
    const missingBib = !r.bib;

    tbody.innerHTML += `
      <tr class="${missingBib ? 'unassigned' : ''}">
        <td>${r.place}</td>
        <td contenteditable="true" onblur="updateField(${i}, 'name', this.innerText)">
          ${r.name}
        </td>
        <td contenteditable="true" onblur="updateField(${i}, 'bib', this.innerText)">
          ${r.bib}
        </td>
        <td>${format(r.time)}</td>
      </tr>`;
  });
}

function save() {
  localStorage.setItem("raceData", JSON.stringify(data));
}

function exportCSV() {
  const race = data.races[data.current];
  let csv = "Place,Name,Bib,Time\n";

  race.forEach(r => {
    csv += `${r.place},${r.name},${r.bib},${format(r.time)}\n`;
  });

  const blob = new Blob([csv], {type: "text/csv"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "race_results.csv";
  a.click();
}

render();
</script>

</body>
</html>
