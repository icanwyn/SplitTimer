<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meet Timer Pro</title>

<style>
:root {
  --bg: #f5f5f7;
  --card: rgba(255,255,255,0.7);
  --border: rgba(0,0,0,0.08);
  --text: #1d1d1f;
  --accent: #007aff;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  text-align: center;
}

.container {
  max-width: 750px;
  margin: auto;
  padding: 20px;
}

.card {
  background: var(--card);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
}

.timer {
  font-size: 3.2rem;
  font-weight: 600;
  margin: 10px 0;
}

button {
  border: none;
  border-radius: 16px;
  padding: 14px 20px;
  margin: 6px 0;
  font-size: 1rem;
  cursor: pointer;
}

.primary {
  background: var(--accent);
  color: white;
  width: 100%;
  height: 90px;
  font-size: 1.6rem;
  font-weight: 600;
}

.finish {
  width: 100%;
  height: 260px;
  font-size: 3rem;
  font-weight: 700;
  background: #34c759;
  color: white;
  border-radius: 24px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.95rem;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid var(--border);
}

.unassigned {
  background: rgba(255,149,0,0.15);
}

.podium {
  display: flex;
  justify-content: space-around;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Meet Timer Pro</h2>

<!-- TIMER -->
<div class="card">
  <div class="timer" id="timer">00:00.000</div>

  <button class="primary" onclick="start()">Start</button>
  <button onclick="stop()">Stop</button>
  <button onclick="resetRace()">Reset</button>
</div>

<!-- SELECTORS -->
<div class="card">
  <label>Event</label>
  <select id="eventSelect" onchange="switchEvent(this.value)"></select>

  <br><br>

  <label>Heat</label>
  <select id="heatSelect" onchange="switchHeat(this.value)"></select>
</div>

<!-- CSV IMPORT -->
<div class="card">
  <b>Import Meet CSV</b><br><br>
  <input type="file" accept=".csv" onchange="handleCSV(event)" />
</div>

<!-- FINISH -->
<button class="finish" onclick="finish()">TAP FINISH</button>

<!-- CONTROLS -->
<div class="card">
  <button onclick="undo()">Undo Last</button>
  <button onclick="newHeat()">New Heat</button>
  <button onclick="exportCSV()">Export CSV</button>
</div>

<!-- PODIUM -->
<div class="card" id="podium"></div>

<!-- RESULTS -->
<div class="card">
  <table>
    <thead>
      <tr>
        <th>Place</th>
        <th>Name</th>
        <th>Grade</th>
        <th>Gender</th>
        <th>School</th>
        <th>Bib</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody id="results"></tbody>
  </table>
</div>

</div>

<script>
let startTime = null;
let running = false;
let interval = null;

let data = JSON.parse(localStorage.getItem("meetData")) || {
  events: [
    {
      name: "100m Dash",
      heats: [
        {
          heatNumber: 1,
          athletes: [
            { name: "John Smith", grade: 7, gender: "M", school: "Miller", bib: "101", time: null },
            { name: "Alex Kim", grade: 8, gender: "F", school: "Blach", bib: "102", time: null }
          ]
        }
      ]
    }
  ],
  currentEvent: 0,
  currentHeat: 0
};

function format(ms) {
  const m = Math.floor(ms/60000);
  const s = Math.floor((ms%60000)/1000);
  const ms2 = ms%1000;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms2).padStart(3,'0')}`;
}

function tick() {
  if (!running) return;
  document.getElementById("timer").textContent = format(Date.now() - startTime);
}

function start() {
  if (running) return;
  running = true;
  startTime = Date.now();
  interval = setInterval(tick, 30);
}

function stop() {
  running = false;
  clearInterval(interval);
}

function finish() {
  if (!running) return;

  const heat = data.events[data.currentEvent].heats[data.currentHeat];
  const time = Date.now() - startTime;

  const athlete = heat.athletes.find(a => a.time === null);
  if (athlete) athlete.time = time;

  save();
  render();
}

function getRanked(athletes) {
  return [...athletes]
    .filter(a => a.time !== null)
    .sort((a,b) => a.time - b.time);
}

function render() {
  const event = data.events[data.currentEvent];
  const heat = event.heats[data.currentHeat];

  const ranked = getRanked(heat.athletes);

  const tbody = document.getElementById("results");
  tbody.innerHTML = "";

  ranked.forEach((a, i) => {
    tbody.innerHTML += `
      <tr style="${i<3 ? 'background:rgba(52,199,89,0.15);font-weight:600;' : ''}">
        <td>${i+1}</td>
        <td>${a.name}</td>
        <td>${a.grade}</td>
        <td>${a.gender}</td>
        <td>${a.school}</td>
        <td>${a.bib}</td>
        <td>${format(a.time)}</td>
      </tr>
    `;
  });

  renderPodium();
  loadSelectors();
}

function renderPodium() {
  const event = data.events[data.currentEvent];
  const heat = event.heats[data.currentHeat];

  const top = getRanked(heat.athletes).slice(0,3);
  const p = document.getElementById("podium");

  if (!top.length) {
    p.innerHTML = "No results yet";
    return;
  }

  p.innerHTML = `
    <h3>${event.name} - Heat ${heat.heatNumber}</h3>
    <div class="podium">
      ${top.map((a,i)=>`
        <div>
          <div>${i===0?"🥇":i===1?"🥈":"🥉"}</div>
          <div>${a.name}</div>
          <div>${format(a.time)}</div>
        </div>
      `).join("")}
    </div>
  `;
}

function loadSelectors() {
  const e = document.getElementById("eventSelect");
  const h = document.getElementById("heatSelect");

  e.innerHTML = "";
  h.innerHTML = "";

  data.events.forEach((ev,i)=>{
    e.innerHTML += `<option value="${i}">${ev.name}</option>`;
  });

  const event = data.events[data.currentEvent];

  event.heats.forEach((ht,i)=>{
    h.innerHTML += `<option value="${i}">Heat ${ht.heatNumber}</option>`;
  });

  e.value = data.currentEvent;
  h.value = data.currentHeat;
}

function switchEvent(i){
  data.currentEvent = +i;
  data.currentHeat = 0;
  save();
  render();
}

function switchHeat(i){
  data.currentHeat = +i;
  save();
  render();
}

function undo(){
  const heat = data.events[data.currentEvent].heats[data.currentHeat];
  const last = [...heat.athletes].reverse().find(a=>a.time!==null);
  if (last) last.time = null;
  save();
  render();
}

function newHeat(){
  const event = data.events[data.currentEvent];
  event.heats.push({
    heatNumber: event.heats.length+1,
    athletes:[]
  });
  save();
  render();
}

function resetRace(){
  stop();
  startTime = null;
  document.getElementById("timer").textContent="00:00.000";
}

function save(){
  localStorage.setItem("meetData", JSON.stringify(data));
}

function exportCSV(){
  const heat = data.events[data.currentEvent].heats[data.currentHeat];

  let csv="Place,Name,Grade,Gender,School,Bib,Time\n";

  getRanked(heat.athletes).forEach((a,i)=>{
    csv+=`${i+1},${a.name},${a.grade},${a.gender},${a.school},${a.bib},${format(a.time)}\n`;
  });

  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);

  const a=document.createElement("a");
  a.href=url;
  a.download="results.csv";
  a.click();
}

/* CSV IMPORT */
function handleCSV(e){
  const file=e.target.files[0];
  const reader=new FileReader();

  reader.onload=function(ev){
    const lines=ev.target.result.trim().split("\n");
    const headers=lines[0].split(",");

    const map={};

    for(let i=1;i<lines.length;i++){
      const row=lines[i].split(",");
      let obj={};

      headers.forEach((h,idx)=>obj[h.trim()]=row[idx].trim());

      const evn=obj.event;

      if(!map[evn]){
        map[evn]={name:evn,heats:{}};
      }

      if(!map[evn].heats[obj.heat]){
        map[evn].heats[obj.heat]={
          heatNumber:+obj.heat,
          athletes:[]
        };
      }

      map[evn].heats[obj.heat].athletes.push({
        name:obj.name,
        grade:obj.grade,
        gender:obj.gender,
        school:obj.school,
        bib:obj.bib,
        time:null
      });
    }

    data.events=Object.values(map).map(e=>({
      name:e.name,
      heats:Object.values(e.heats)
    }));

    data.currentEvent=0;
    data.currentHeat=0;

    save();
    render();
  };

  reader.readAsText(file);
}

render();
</script>

</body>
</html>
